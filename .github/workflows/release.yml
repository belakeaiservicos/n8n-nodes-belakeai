name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # --ignore-scripts skips the `prepublishOnly: n8n-node prerelease` guard,
      # which is intended to prevent local npm publish. In CI we run the build
      # step explicitly above, so dist/ is already in place.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --ignore-scripts
